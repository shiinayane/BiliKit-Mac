// Clean-room schema derived from BiliKit's own M4 contract observations.
// Keep generator and runtime pinned to SwiftProtobuf 1.38.1 (ADR 0008).
syntax = "proto3";

package bilikit.danmaku;

message SegmentReply {
  repeated Element elements = 1;
}

message Element {
  int64 id = 1;
  int32 progress_milliseconds = 2;
  int32 mode = 3;
  int32 font_size = 4;
  uint32 color_rgb = 5;
  string sender_hash = 6;
  string content = 7;
  int64 created_at = 8;
  int32 weight = 9;
  string action = 10;
  int32 pool = 11;
  string id_string = 12;
  int32 attributes = 13;
}
