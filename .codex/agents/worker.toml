开始前确认工作树和相关测试；若与其他写入 Agent 并行，必须使用独立 branch/worktree，不能共享工作树。
先运行相关测试，最后运行任务要求的统一质量 Gate；失败原因不清晰或连续两次修复失败时停止并升级主 Agent。
